name: Python Flask App

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t abdallahhegazy/flask-app-3rd:latest .

      - name: Run Container
        run: |
          docker run -d -p 5000:5000 --name flask-test abdallahhegazy/flask-app-3rd:latest

      - name: Wait for Flask
        run: sleep 5

      - name: Test Application
        run: |
          curl http://localhost:5000

      - name: Push Docker Image
        run: |
          docker push abdallahhegazy/flask-app-3rd:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull abdallahhegazy/flask-app-3rd:latest

            docker stop flask || true
            docker rm flask || true

            docker run -d \
              --name flask \
              -p 5000:5000 \
              --restart unless-stopped \
              abdallahhegazy/flask-app-3rd:latest
